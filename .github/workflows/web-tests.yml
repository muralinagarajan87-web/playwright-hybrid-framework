name: Web Tests — SauceDemo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:

jobs:
  sanity:
    name: Web Sanity (PR Gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check and lint
        run: |
          npm run typecheck
          npm run lint

      # Cache the Chromium binary between runs. The key is tied to package-lock.json
      # so the cache is invalidated automatically when the Playwright version changes.
      # System dependencies (apt packages from --with-deps) cannot be cached but are
      # much faster to install than re-downloading the browser binary (~100 MB).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-

      # Sanity runs Chromium only — keeps PR gate fast.
      # Firefox is added in the regression job for cross-browser coverage.
      - name: Install Playwright browsers (sanity — Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run web sanity tests
        run: npx playwright test --project=web --grep @sanity

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-sanity-report
          path: playwright-report/
          retention-days: 7

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-sanity-results-json-${{ github.run_id }}
          path: test-results/results.json
          retention-days: 90

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data "{\"text\":\"🔴 *Web Sanity* failed on \`${{ github.ref_name }}\` (PR gate) — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi

  regression:
    name: Web Full Regression
    runs-on: ubuntu-latest
    # On workflow_dispatch: wait for sanity to pass before spending CI minutes on regression.
    # On push/schedule: sanity is skipped (result = 'skipped'), so regression runs immediately.
    # always() is required — without it, a skipped sanity job would block regression entirely.
    needs: [sanity]
    if: >
      always() &&
      (needs.sanity.result == 'success' || needs.sanity.result == 'skipped') &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check and lint
        run: |
          npm run typecheck
          npm run lint

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-firefox-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-firefox-

      # Regression installs both Chromium and Firefox for cross-browser coverage.
      # Firefox catches browser-specific rendering and behaviour differences.
      - name: Install Playwright browsers (regression — Chromium + Firefox)
        run: npx playwright install chromium firefox --with-deps

      - name: Run web regression tests (Chromium + Firefox)
        run: npx playwright test --project=web --project=web-firefox --grep @regression

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-regression-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-regression-results-json-${{ github.run_id }}
          path: test-results/results.json
          retention-days: 90

      # Nightly failures alert the team without needing to monitor CI dashboards.
      # Add SLACK_WEBHOOK_URL as a GitHub repository secret to activate this step.
      - name: Notify on nightly failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data "{\"text\":\"🔴 *Nightly Web Regression* failed on \`${{ github.ref_name }}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi
