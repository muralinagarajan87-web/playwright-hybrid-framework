name: API Tests — Restful-Booker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:

jobs:
  sanity:
    name: API Sanity (PR Gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check and lint
        run: |
          npm run typecheck
          npm run lint

      # Wake up the Heroku free-tier dyno before running tests.
      # A cold dyno can take 10-15 s to respond; without this step the first
      # test hits a 503 or a very slow response that trips the L3 time gate.
      - name: Warm up API (Heroku cold-start)
        run: |
          echo "Pinging API..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://restful-booker.herokuapp.com/ping)
            echo "  attempt $i — HTTP $STATUS"
            [ "$STATUS" = "201" ] && echo "API is warm." && break
            sleep 5
          done

      - name: Run API sanity tests
        run: npx playwright test --project=api --grep @sanity
        env:
          SKIP_BROWSER_SETUP: 'true'

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-sanity-report
          path: playwright-report/
          retention-days: 7

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-sanity-results-json-${{ github.run_id }}
          path: test-results/results.json
          retention-days: 90

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data "{\"text\":\"🔴 *API Sanity* failed on \`${{ github.ref_name }}\` (PR gate) — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi

  regression:
    name: API Full Regression
    runs-on: ubuntu-latest
    # On workflow_dispatch: wait for sanity to pass before spending CI minutes on regression.
    # On push/schedule: sanity is skipped (result = 'skipped'), so regression runs immediately.
    # always() is required — without it, a skipped sanity job would block regression entirely.
    needs: [sanity]
    if: >
      always() &&
      (needs.sanity.result == 'success' || needs.sanity.result == 'skipped') &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check and lint
        run: |
          npm run typecheck
          npm run lint

      - name: Warm up API (Heroku cold-start)
        run: |
          echo "Pinging API..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://restful-booker.herokuapp.com/ping)
            echo "  attempt $i — HTTP $STATUS"
            [ "$STATUS" = "201" ] && echo "API is warm." && break
            sleep 5
          done

      - name: Run API regression tests
        run: npx playwright test --project=api --grep @regression
        env:
          SKIP_BROWSER_SETUP: 'true'

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-results-json-${{ github.run_id }}
          path: test-results/results.json
          retention-days: 90

      # Nightly failures alert the team without needing to monitor CI dashboards.
      # Add SLACK_WEBHOOK_URL as a GitHub repository secret to activate this step.
      - name: Notify on nightly failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data "{\"text\":\"🔴 *Nightly API Regression* failed on \`${{ github.ref_name }}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi
