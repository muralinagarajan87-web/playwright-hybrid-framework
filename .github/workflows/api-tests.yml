name: API Tests — Restful-Booker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:

jobs:
  sanity:
    name: API Sanity (PR Gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API sanity tests
        run: npx playwright test --project=api --grep @sanity

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-sanity-report
          path: playwright-report/
          retention-days: 7

  regression:
    name: API Full Regression
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API regression tests
        run: npx playwright test --project=api --grep @regression

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30
